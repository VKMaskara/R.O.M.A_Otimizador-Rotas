<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.O.M.A-Login</title>
    <link rel="stylesheet" href="telas.css">
</head>
<body>
<div class="container">

    <div class="login-card">

            <img src="../img/logo.jpeg" alt="Logo ROMA" class="logo" >

            <h1>Bem-vindo</h1>
    <form id="login-form">

            <div class="inicio">
                    <label>E-mail</label>

                    <input type="email" id=email placeholder="Digite seu e-mail">
                </div>

                <div class="inicio">
                    <label>Senha</label>

                    <input type="password" id=senha placeholder="Digite sua senha">
            </div>

                <button type="submit">
                    Entrar
                </button>

    </form>

             <p class="cadastro-link">
    Não possui cadastro?
    
    <a href="../cadastro/cadastro.html">
        Cadastre-se
    </a>
</p>

        </div>

    </div>
<script src="telas.js"></script>
</body>
</html>
