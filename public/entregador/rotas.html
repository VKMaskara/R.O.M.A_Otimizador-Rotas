<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R.O.M.A - Minhas Entregas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/entregador-rotas.css">
</head>
<body>

    <!-- TOPBAR -->
    <header class="topbar d-flex align-items-center justify-content-between px-3">
        <div class="d-flex align-items-center gap-2">
            <div class="bg-white rounded-3 p-1">
                <img src="../img/logo.jpeg" alt="ROMA" style="height:32px;">
            </div>
            <div>
                <p class="mb-0 fw-bold text-white lh-1" style="font-size:15px;">R.O.M.A</p>
                <p class="mb-0 text-white-50" style="font-size:11px;" id="header-nome">Entregador</p>
            </div>
        </div>
        <button class="btn btn-logout-top" id="btn-sair">
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </header>

    <!-- CONTEÚDO -->
    <main class="main-scroll">

        <!-- SAUDAÇÃO -->
        <section class="saudacao px-4 pt-4 pb-3">
            <h1 class="h4 fw-bold text-navy mb-0">Minhas Rotas</h1>
            <p class="text-muted mb-0" id="subtitulo-data">—</p>
        </section>

        <!-- CARDS DE RESUMO -->
        <section class="d-flex gap-3 px-4 pb-3 overflow-auto resumo-scroll">
            <div class="resumo-card flex-shrink-0">
                <p class="resumo-label">Total</p>
                <p class="resumo-valor" id="stat-total">—</p>
            </div>
            <div class="resumo-card flex-shrink-0">
                <p class="resumo-label">Pendentes</p>
                <p class="resumo-valor text-warning" id="stat-pendentes">—</p>
            </div>
            <div class="resumo-card flex-shrink-0">
                <p class="resumo-label">Concluídas</p>
                <p class="resumo-valor text-success" id="stat-concluidas">—</p>
            </div>
        </section>

        <!-- LOADING -->
        <div id="loading-rotas" class="text-center py-5 text-muted">
            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
            Buscando suas rotas...
        </div>

        <!-- LISTA DE ROTAS -->
        <section class="px-4 pb-5" id="secao-rotas" style="display:none;">
            <p class="text-muted fw-semibold mb-3" style="font-size:12px; text-transform:uppercase; letter-spacing:.05em;">
                Rotas atribuídas a você
            </p>
            <div id="lista-rotas" class="d-flex flex-column gap-3"></div>
        </section>

        <!-- ESTADO VAZIO -->
        <div id="estado-vazio" class="text-center py-5 px-4 d-none">
            <i class="bi bi-inbox text-muted" style="font-size:48px;"></i>
            <p class="text-muted mt-3 fw-semibold">Nenhuma rota atribuída a você ainda.</p>
            <p class="text-muted small">Aguarde o responsável atribuir uma rota.</p>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/entregador-rotas.js"></script>
</body>
</html>
