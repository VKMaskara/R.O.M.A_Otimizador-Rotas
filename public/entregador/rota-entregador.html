<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R.O.M.A - Minha Rota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="./css/rota-entregador.css?v=3">
</head>
<body>

    <!-- TOPBAR -->
    <header class="topbar-mobile d-flex align-items-center justify-content-between px-3 py-2">
        <div class="d-flex align-items-center gap-2">
            <a href="rotas.html" class="btn-voltar">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div class="bg-white rounded-3 p-1">
                <img src="../img/logo.jpeg" alt="ROMA" style="height:28px;">
            </div>
            <div>
                <p class="mb-0 fw-bold text-white lh-1" style="font-size:14px;" id="header-rota">Carregando...</p>
                <p class="mb-0 text-white-50" style="font-size:11px;" id="header-data">—</p>
            </div>
        </div>
        <span id="header-status" class="badge rounded-pill px-3 py-2">—</span>
    </header>

    <!-- MAPA -->
    <div id="mapa"></div>

    <!-- PAINEL INFERIOR -->
    <div id="painel" class="painel">

        <!-- ALÇA -->
        <div class="alca" id="alca">
            <div class="alca-barra"></div>
        </div>

        <!-- RESUMO (sempre visível) -->
        <div class="resumo-rota">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex gap-3">
                    <div class="text-center">
                        <p class="mb-0 text-muted" style="font-size:10px;">DISTÂNCIA</p>
                        <p class="mb-0 fw-bold text-navy" id="resumo-km" style="font-size:13px;">—</p>
                    </div>
                    <div class="text-center">
                        <p class="mb-0 text-muted" style="font-size:10px;">TEMPO EST.</p>
                        <p class="mb-0 fw-bold text-navy" id="resumo-tempo" style="font-size:13px;">—</p>
                    </div>
                    <div class="text-center">
                        <p class="mb-0 text-muted" style="font-size:10px;">ENTREGAS</p>
                        <p class="mb-0 fw-bold text-navy" id="resumo-entregas" style="font-size:13px;">—</p>
                    </div>
                </div>
                <button class="btn btn-orange btn-sm fw-bold px-3" id="btn-proxima" style="font-size:13px;">
                    <i class="bi bi-arrow-right-circle me-1"></i> Próxima
                </button>
            </div>
        </div>

        <!-- SCROLL INTERNO -->
        <div class="painel-scroll">

            <!-- PARADA ATUAL -->
            <div id="parada-atual-card" class="parada-atual d-none">
                <div class="d-flex align-items-start gap-2">
                    <div id="parada-numero" class="numero-parada flex-shrink-0">1</div>
                    <div class="flex-grow-1 min-width-0">
                        <p class="mb-0 fw-bold text-navy text-truncate" id="parada-destinatario" style="font-size:14px;">—</p>
                        <p class="mb-1 text-muted text-truncate" id="parada-endereco" style="font-size:12px;">—</p>
                        <div class="d-flex gap-2 flex-wrap">
                            <span class="badge bg-light text-navy border" id="parada-codigo" style="font-size:11px;">—</span>
                            <span id="parada-obs" class="badge bg-warning-subtle text-warning-emphasis d-none" style="font-size:11px;"></span>
                        </div>
                    </div>
                    <div class="d-flex gap-1 flex-shrink-0">
                        <button class="btn btn-primary btn-sm fw-bold d-none" id="btn-navegar" title="Navegar">
                            <i class="bi bi-map"></i>
                        </button>
                        <button class="btn btn-success btn-sm fw-bold" id="btn-concluir" title="Concluir entrega">
                            <i class="bi bi-check-lg"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- LISTA DE PARADAS -->
            <div style="padding: 0 0 8px;">
                <p class="text-muted fw-semibold mb-2 px-3" style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;">
                    Sequência de Entregas
                </p>
                <ul id="lista-paradas" class="paradas-lista list-unstyled mb-0"></ul>
            </div>

        </div><!-- /painel-scroll -->

    </div>

    <!-- BOTÃO FLUTUANTE -->
    <button class="btn-flutuante" id="btn-localizar" title="Minha localização">
        <i class="bi bi-crosshair2"></i>
    </button>

    <!-- LOADING -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="text-center text-white">
            <div class="spinner-border mb-3" role="status"></div>
            <p class="fw-semibold">Carregando rota...</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/rota-entregador.js?v=3"></script>
</body>
</html>
