<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.O.M.A - Editar Entregador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <div class="d-flex min-vh-100 layout-container">

        <aside class="sidebar offcanvas-lg offcanvas-start text-white p-4" id="sidebarMenu">
            <div class="offcanvas-header d-lg-none p-0 mb-4">
                <h5 class="offcanvas-title text-white">Menu ROMA</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu"></button>
            </div>

            <div class="logo-area bg-white p-3 rounded-4 text-center mb-5">
                <img src="../img/logo.jpeg" alt="Logo ROMA" class="img-fluid logo-img">
            </div>

            <nav class="menu-nav d-flex flex-column gap-2 flex-grow-1">
                <a href="./dashboard.html" class="nav-link-custom">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
                <a href="./rotas.html" class="nav-link-custom">
                    <i class="bi bi-geo-alt me-2"></i> Rotas
                </a>
                <a href="./entregadores.html" class="nav-link-custom active">
                    <i class="bi bi-truck me-2"></i> Entregadores
                </a>
                <a href="configuracoes.html" class="nav-link-custom">
                    <i class="bi bi-gear me-2"></i> Configurações
                </a>
            </nav>

            <div class="logout-area mt-auto pt-4">
                <a href="../login/login.html" class="btn-logout text-center d-block w-100 py-3 rounded-3 text-decoration-none fw-bold text-white">
                    <i class="bi bi-box-arrow-right me-2"></i> Sair
                </a>
            </div>
        </aside>

        <main class="main-content flex-grow-1 p-4 p-md-5">

            <header class="d-flex justify-content-between align-items-center mb-5">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-dark d-lg-none" type="button"
                            data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                        <i class="bi bi-list fs-4"></i>
                    </button>
                    <h1 class="h2 fw-bold text-navy mb-0">Editar Entregador</h1>
                </div>
                <a href="entregadores.html" class="btn btn-outline-secondary px-4 py-2 fw-bold">
                    <i class="bi bi-arrow-left me-1"></i> Voltar
                </a>
            </header>

            <section class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
                <form id="form-editar-entregador">

                    <h5 class="fw-bold text-navy mb-4">Dados do Usuário</h5>

                    <div class="row g-4 mb-4">

                        <div class="col-12 col-md-6">
                            <label class="form-label fw-bold text-navy">
                                Nome Completo <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control py-3 rounded-3" id="nome"
                                   placeholder="Nome completo">
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label fw-bold text-navy">
                                E-mail de Acesso <span class="text-danger">*</span>
                            </label>
                            <input type="email" class="form-control py-3 rounded-3" id="email"
                                   placeholder="email@exemplo.com">
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label fw-bold text-navy">
                                Telefone/WhatsApp
                            </label>
                            <input type="tel" class="form-control py-3 rounded-3" id="telefone"
                                   placeholder="11999999999">
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label fw-bold text-navy">
                                Nova Senha
                                <small class="text-muted fw-normal">(deixe em branco para manter)</small>
                            </label>
                            <input type="password" class="form-control py-3 rounded-3" id="senha"
                                   placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                        </div>

                    </div>

                    <hr class="my-4">
                    <h5 class="fw-bold text-navy mb-4">Dados do Veículo e Contrato</h5>

                    <div class="row g-4 mb-5">

                        <div class="col-12 col-md-6">
                            <label class="form-label fw-bold text-navy">
                                CPF <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control py-3 rounded-3" id="cpf"
                                   placeholder="Somente números" maxlength="11">
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label fw-bold text-navy">
                                Tipo de Veículo <span class="text-danger">*</span>
                            </label>
                            <select class="form-select py-3 rounded-3" id="veiculo">
                                <option value="">Selecione...</option>
                                <option value="Moto">Moto</option>
                                <option value="Carro">Carro</option>
                                <option value="Van">Van</option>
                                <option value="Caminhão">Caminhão</option>
                                <option value="Bicicleta">Bicicleta</option>
                            </select>
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label fw-bold text-navy">Placa do Veículo</label>
                            <input type="text" class="form-control py-3 rounded-3" id="placa"
                                   placeholder="ABC-1234" maxlength="8">
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label fw-bold text-navy">
                                Capacidade de Carga (kg / m³)
                            </label>
                            <input type="number" class="form-control py-3 rounded-3" id="capacidade"
                                   placeholder="Ex: 60" min="0" step="0.1">
                        </div>

                    </div>

                    <div class="d-flex flex-wrap gap-3">
                        <button type="submit" class="btn btn-orange px-5 py-3 fw-bold text-white flex-grow-1 shadow-sm">
                            <i class="bi bi-check-lg me-1"></i> Salvar Alterações
                        </button>
                        <a href="entregadores.html" class="btn btn-light px-5 py-3 fw-bold text-secondary">
                            <i class="bi bi-x-lg me-1"></i> Cancelar
                        </a>
                        <button type="button" class="btn btn-outline-danger px-4 py-3 fw-bold" id="btnExcluir">
                            <i class="bi bi-trash me-1"></i> Excluir Entregador
                        </button>
                    </div>

                </form>
            </section>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/editar-entregador.js"></script>
</body>
</html>
