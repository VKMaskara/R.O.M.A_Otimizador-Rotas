<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.O.M.A - Configurações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/configuracoes.css">
</head>

<body>

    <div class="d-flex min-vh-100 layout-container">

        <!-- MENU LATERAL -->
        <aside class="sidebar offcanvas-lg offcanvas-start text-white p-4" id="sidebarMenu">
            <div class="offcanvas-header d-lg-none p-0 mb-4">
                <h5 class="offcanvas-title text-white">Menu ROMA</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                    data-bs-target="#sidebarMenu"></button>
            </div>

            <div class="logo-area bg-white p-3 rounded-4 text-center mb-5">
                <img src="../img/logo.jpeg" alt="Logo ROMA" class="img-fluid logo-img">
            </div>

            <nav class="menu-nav d-flex flex-column gap-2 flex-grow-1">
                <a href="dashboard.html" class="nav-link-custom">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
                <a href="rotas.html" class="nav-link-custom">
                    <i class="bi bi-geo-alt me-2"></i> Rotas
                </a>
                <a href="entregadores.html" class="nav-link-custom">
                    <i class="bi bi-truck me-2"></i> Entregadores
                </a>
                <a href="configuracoes.html" class="nav-link-custom active">
                    <i class="bi bi-gear me-2"></i> Configurações
                </a>
            </nav>

            <div class="logout-area mt-auto pt-4">
                <a href="login.html"
                    class="btn-logout text-center d-block w-100 py-3 rounded-3 text-decoration-none fw-bold text-white">
                    <i class="bi bi-box-arrow-right me-2"></i> Sair
                </a>
            </div>
        </aside>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="main-content flex-grow-1 p-4 p-md-5">

            <!-- TOPO -->
            <header class="d-flex align-items-center gap-3 mb-5">
                <button class="btn btn-outline-dark d-lg-none" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#sidebarMenu">
                    <i class="bi bi-list fs-4"></i>
                </button>
                <h1 class="h2 fw-bold text-navy mb-0">Configurações</h1>
            </header>

            <!-- ALERTA GLOBAL -->
            <div id="alerta-global" class="alert d-none mb-4 rounded-3" role="alert"></div>

            <!-- LOADING -->
            <div id="loading-config" class="text-center py-5 text-muted">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                Carregando configurações...
            </div>

            <div id="conteudo-config" class="d-none">

                <!-- DADOS DA EMPRESA -->
                <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 mb-4">
                    <h2 class="h4 fw-bold text-navy border-bottom pb-3 mb-4">
                        <i class="bi bi-building me-2"></i> Dados da Empresa
                    </h2>

                    <form id="form-empresa">
                        <div class="row g-4">

                            <div class="col-12 col-md-6">
                                <label for="nome-empresa" class="form-label fw-semibold text-navy">
                                    Nome da Empresa <span class="text-danger">*</span>
                                </label>
                                <input type="text" id="nome-empresa"
                                    class="form-control form-control-lg input-custom"
                                    placeholder="Nome da empresa">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="cnpj-empresa" class="form-label fw-semibold text-navy">CNPJ</label>
                                <input type="text" id="cnpj-empresa"
                                    class="form-control form-control-lg input-custom input-readonly"
                                    readonly placeholder="—">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="email-empresa" class="form-label fw-semibold text-navy">
                                    E-mail <span class="text-danger">*</span>
                                </label>
                                <input type="email" id="email-empresa"
                                    class="form-control form-control-lg input-custom"
                                    placeholder="email@empresa.com">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="telefone-empresa" class="form-label fw-semibold text-navy">Telefone</label>
                                <input type="tel" id="telefone-empresa"
                                    class="form-control form-control-lg input-custom"
                                    placeholder="(11) 99999-9999">
                            </div>

                            <div class="col-12">
                                <button type="submit" class="btn btn-orange fw-bold px-5 py-3 text-white">
                                    <i class="bi bi-floppy me-2"></i> Salvar Alterações
                                </button>
                            </div>

                        </div>
                    </form>
                </div>

                <!-- SEGURANÇA -->
                <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 mb-4">
                    <h2 class="h4 fw-bold text-navy border-bottom pb-3 mb-4">
                        <i class="bi bi-shield-lock me-2"></i> Segurança
                    </h2>

                    <form id="form-senha">
                        <div class="row g-4">

                            <div class="col-12 col-md-6">
                                <label for="nova-senha" class="form-label fw-semibold text-navy">Nova Senha</label>
                                <input type="password" id="nova-senha"
                                    class="form-control form-control-lg input-custom"
                                    placeholder="Digite a nova senha">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="confirmar-senha" class="form-label fw-semibold text-navy">Confirmar Senha</label>
                                <input type="password" id="confirmar-senha"
                                    class="form-control form-control-lg input-custom"
                                    placeholder="Confirme a nova senha">
                            </div>

                            <div class="col-12">
                                <button type="submit" class="btn btn-orange fw-bold px-5 py-3 text-white">
                                    <i class="bi bi-key me-2"></i> Atualizar Senha
                                </button>
                            </div>

                        </div>
                    </form>
                </div>

                <!-- ZONA DE PERIGO -->
                <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 border-danger-subtle">
                    <h2 class="h4 fw-bold text-danger border-bottom pb-3 mb-4">
                        <i class="bi bi-exclamation-triangle me-2"></i> Zona de Perigo
                    </h2>

                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="fw-semibold text-navy mb-1">Excluir Empresa</p>
                            <p class="text-muted small mb-0">Esta ação é permanente e não pode ser desfeita. Todos os dados serão removidos.</p>
                        </div>
                        <button id="btn-excluir" class="btn btn-danger fw-bold px-4 py-2 flex-shrink-0 ms-4">
                            <i class="bi bi-trash me-2"></i> Excluir Empresa
                        </button>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/configuracoes.js"></script>
</body>

</html>
