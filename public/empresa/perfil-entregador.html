<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.O.M.A - Perfil do Entregador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/perfil-entregador.css">
</head>

<body>

    <div class="d-flex min-vh-100 layout-container">

        <!-- MENU LATERAL -->
        <aside class="sidebar offcanvas-lg offcanvas-start text-white p-4" id="sidebarMenu">
            <div class="offcanvas-header d-lg-none p-0 mb-4">
                <h5 class="offcanvas-title text-white">Menu ROMA</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                    data-bs-target="#sidebarMenu"></button>
            </div>

            <div class="logo-area bg-white p-3 rounded-4 text-center mb-5">
                <img src="../img/logo.jpeg" alt="Logo ROMA" class="img-fluid logo-img">
            </div>

            <nav class="menu-nav d-flex flex-column gap-2 flex-grow-1">
                <a href="dashboard.html" class="nav-link-custom">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
                <a href="rotas.html" class="nav-link-custom">
                    <i class="bi bi-geo-alt me-2"></i> Rotas
                </a>
                <a href="entregadores.html" class="nav-link-custom active">
                    <i class="bi bi-truck me-2"></i> Entregadores
                </a>
                <a href="configuracoes.html" class="nav-link-custom">
                    <i class="bi bi-gear me-2"></i> Configurações
                </a>
            </nav>

            <div class="logout-area mt-auto pt-4">
                <a href="login.html"
                    class="btn-logout text-center d-block w-100 py-3 rounded-3 text-decoration-none fw-bold text-white">
                    <i class="bi bi-box-arrow-right me-2"></i> Sair
                </a>
            </div>
        </aside>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="main-content flex-grow-1 p-4 p-md-5">

            <!-- TOPO -->
            <header class="d-flex justify-content-between align-items-center mb-5">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-dark d-lg-none" type="button" data-bs-toggle="offcanvas"
                        data-bs-target="#sidebarMenu">
                        <i class="bi bi-list fs-4"></i>
                    </button>
                    <h1 class="h2 fw-bold text-navy mb-0">Perfil do Entregador</h1>
                </div>
                <button class="btn btn-orange px-4 py-2 fw-bold text-white shadow-sm" id="btnEditar">
                    <i class="bi bi-pencil-square me-1"></i> Editar Perfil
                </button>
            </header>

            <!-- LOADING -->
            <div id="loading-perfil" class="text-center py-5 text-muted">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                Carregando perfil...
            </div>

            <!-- CONTEÚDO (oculto até carregar) -->
            <div id="conteudo-perfil" class="d-none">

                <!-- CARD PERFIL -->
                <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 mb-4">
                    <div class="d-flex flex-column flex-md-row align-items-center gap-4">

                        <!-- AVATAR -->
                        <div class="avatar-area flex-shrink-0 text-center">
                            <div class="avatar-circle d-flex align-items-center justify-content-center">
                                <i class="bi bi-person-fill text-white" style="font-size: 64px;"></i>
                            </div>
                            <span id="badge-status" class="badge rounded-pill mt-3 d-inline-block px-3 py-2">
                                Ativo
                            </span>
                        </div>

                        <!-- DADOS -->
                        <div class="flex-grow-1">
                            <h2 id="nome-entregador" class="h3 fw-bold text-navy mb-3">—</h2>

                            <div class="row g-3">
                                <div class="col-12 col-sm-6">
                                    <p class="text-muted small mb-1 text-uppercase">CPF</p>
                                    <p id="cpf-entregador" class="fw-semibold mb-0">—</p>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <p class="text-muted small mb-1 text-uppercase">Telefone</p>
                                    <p id="telefone-entregador" class="fw-semibold mb-0">—</p>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <p class="text-muted small mb-1 text-uppercase">E-mail</p>
                                    <p id="email-entregador" class="fw-semibold mb-0">—</p>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <p class="text-muted small mb-1 text-uppercase">Veículo</p>
                                    <p id="veiculo-entregador" class="fw-semibold mb-0">—</p>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <p class="text-muted small mb-1 text-uppercase">Placa</p>
                                    <p id="placa-entregador" class="fw-semibold mb-0">—</p>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <p class="text-muted small mb-1 text-uppercase">Capacidade (kg)</p>
                                    <p id="capacidade-entregador" class="fw-semibold mb-0">—</p>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                <!-- ESTATÍSTICAS -->
                <div class="row g-4">
                    <div class="col-12 col-sm-4">
                        <div class="card border-0 shadow-sm rounded-4 p-4 text-center dashboard-card">
                            <div class="icon-shape bg-light-blue text-navy rounded-3 p-3 mx-auto mb-3">
                                <i class="bi bi-box-seam fs-4"></i>
                            </div>
                            <p class="text-muted small mb-1">Entregas Hoje</p>
                            <span id="stat-hoje" class="fs-1 fw-bold text-navy">—</span>
                        </div>
                    </div>
                    <div class="col-12 col-sm-4">
                        <div class="card border-0 shadow-sm rounded-4 p-4 text-center dashboard-card">
                            <div class="icon-shape bg-light-green text-success rounded-3 p-3 mx-auto mb-3">
                                <i class="bi bi-check2-circle fs-4"></i>
                            </div>
                            <p class="text-muted small mb-1">Rotas Concluídas</p>
                            <span id="stat-concluidas" class="fs-1 fw-bold text-navy">—</span>
                        </div>
                    </div>
                    <div class="col-12 col-sm-4">
                        <div class="card border-0 shadow-sm rounded-4 p-4 text-center dashboard-card">
                            <div class="icon-shape bg-light-warning text-warning rounded-3 p-3 mx-auto mb-3">
                                <i class="bi bi-clock-history fs-4"></i>
                            </div>
                            <p class="text-muted small mb-1">Em Andamento</p>
                            <span id="stat-andamento" class="fs-1 fw-bold text-navy">—</span>
                        </div>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/perfil-entregador.js"></script>
</body>

</html>
