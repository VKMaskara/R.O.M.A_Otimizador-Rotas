<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.O.M.A - Detalhes da Rota</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link class="styles" rel="stylesheet" href="css/detalhes-rota.css">
</head>

<body>

    <div class="container-fluid p-0 d-flex m-0" style="min-height: 100vh;">

        <aside class="sidebar offcanvas-lg offcanvas-start text-white p-4 flex-shrink-0" id="sidebarMenu"
            style="width: 260px; background: linear-gradient(180deg, #0B2A4A, #123B63); z-index: 1050;">
            <div class="offcanvas-header d-lg-none p-0 mb-4">
                <h5 class="offcanvas-title text-white">Menu ROMA</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                    data-bs-target="#sidebarMenu"></button>
            </div>

            <div class="logo-area bg-white p-3 rounded-4 text-center mb-5">
                <img src="../img/logo.jpeg" alt="Logo ROMA" class="img-fluid logo-img">
            </div>

            <nav class="menu-nav d-flex flex-column gap-2 flex-grow-1">
                <a href="./dashboard.html" class="nav-link-custom">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
                <a href="./rotas.html" class="nav-link-custom active">
                    <i class="bi bi-geo-alt me-2"></i> Rotas
                </a>
                <a href="./entregadores.html" class="nav-link-custom">
                    <i class="bi bi-truck me-2"></i> Entregadores
                </a>
                <a href="./configuracoes.html" class="nav-link-custom">
                    <i class="bi bi-gear me-2"></i> Configurações
                </a>
            </nav>

            <div class="logout-area mt-auto pt-4">
                <a href="../login/login.html"
                    class="btn-logout text-center d-block w-100 py-3 rounded-3 text-decoration-none fw-bold text-white">
                    <i class="bi bi-box-arrow-right me-2"></i> Sair
                </a>
            </div>
        </aside>

        <main class="main-content flex-grow-1 bg-light p-4 p-md-5">

            <header class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-dark d-lg-none" type="button" data-bs-toggle="offcanvas"
                        data-bs-target="#sidebarMenu">
                        <i class="bi bi-list fs-4"></i>
                    </button>
                    <h1 class="h3 mb-0 text-dark fw-bold">Detalhes da Rota</h1>
                </div>

                <button class="btn btn-primary btn-lg px-4 editar-btn shadow-sm"
                    style="background-color: #0B2A4A; border-color: #0B2A4A;">
                    <i class="bi bi-pencil-square me-2"></i>Editar Rota
                </button>
            </header>

            <div class="row g-4">
                
                <div class="col-12 col-lg-8">
                    
                    <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                        <h2 class="h4 border-bottom pb-2 mb-3" style="color: #0B2A4A;">Informações da Rota</h2>
                        <div class="row g-3">
                            <div class="col-6 col-sm-4">
                                <p class="text-muted mb-1 small text-uppercase">Código</p>
                                <p id="codigo-rota" class="fw-bold text-secondary mb-0">Carregando...</p>
                            </div>
                            <div class="col-6 col-sm-4">
                                <p class="text-muted mb-1 small text-uppercase">Status</p>
                                <span id="status-badge" class="badge rounded-pill px-3 py-2 text-capitalize">...</span>
                            </div>
                            <div class="col-6 col-sm-4">
                                <p class="text-muted mb-1 small text-uppercase">Prioridade / Distância</p>
                                <span id="prioridade-rota" class="badge bg-secondary text-white px-3 py-2">...</span>
                            </div>
                            <div class="col-6 col-sm-4">
                                <p class="text-muted mb-1 small text-uppercase">Tempo Estimado</p>
                                <p id="horario-rota" class="fw-semibold mb-0">...</p>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                        <h2 class="h4 border-bottom pb-2 mb-3" style="color: #0B2A4A;">Endereço de Destino</h2>
                        <div class="d-flex align-items-start">
                            <i class="bi bi-geo-alt-fill text-danger fs-4 me-3"></i>
                            <div>
                                <p id="endereco-logradouro" class="mb-0 fs-5 text-secondary">Buscando endereço...</p>
                                <p id="endereco-bairro-cidade" class="text-muted mb-0">...</p>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4 p-4">
                        <h2 class="h4 border-bottom pb-2 mb-3" style="color: #0B2A4A;">Observações</h2>
                        <div class="bg-warning bg-opacity-10 border-start border-warning border-4 p-3 rounded-end-3">
                            <p id="observacoes-texto" class="mb-0 text-dark">...</p>
                        </div>
                    </div>

                </div>

                <div class="col-12 col-lg-4">
                    <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                        <h2 class="h4 border-bottom pb-2 mb-3" style="color: #0B2A4A;">Histórico da Rota</h2>
                        <ul id="historico-lista" class="list-group list-group-flush">
                            </ul>
                    </div>
                </div>

            </div> </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/detalhes-rota.js"></script>
</body>

</html>
