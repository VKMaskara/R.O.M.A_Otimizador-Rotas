<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ROMA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <div class="d-flex min-vh-100 layout-container">

        <aside class="sidebar offcanvas-lg offcanvas-start text-white p-4" id="sidebarMenu">
            <div class="offcanvas-header d-lg-none p-0 mb-4">
                <h5 class="offcanvas-title text-white">Menu ROMA</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu"></button>
            </div>

            <div class="logo-area bg-white p-3 rounded-4 text-center mb-5">
                <img src="../img/logo.jpeg" alt="Logo ROMA" class="img-fluid logo-img">
            </div>

            <nav class="menu-nav d-flex flex-column gap-2 flex-grow-1">
                <a href="dashboard.html" class="nav-link-custom active">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
                <a href="rotas.html" class="nav-link-custom">
                    <i class="bi bi-geo-alt me-2"></i> Rotas
                </a>
                <a href="./entregadores.html" class="nav-link-custom">
                    <i class="bi bi-truck me-2"></i> Entregadores
                </a>
                <a href="configuracoes.html" class="nav-link-custom">
                    <i class="bi bi-gear me-2"></i> Configurações
                </a>
            </nav>

            <div class="logout-area mt-auto pt-4">
                <a href="login.html" class="btn-logout text-center d-block w-100 py-3 rounded-3 text-decoration-none fw-bold text-white">
                    <i class="bi bi-box-arrow-right me-2"></i> Sair
                </a>
            </div>
        </aside>

        <main class="main-content flex-grow-1 p-4 p-md-5">

            <header class="d-flex justify-content-between align-items-center mb-5">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-dark d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                        <i class="bi bi-list fs-4"></i>
                    </button>
                    <h1 class="h2 fw-bold text-navy mb-0">Dashboard</h1>
                </div>
                <button class="btn btn-orange px-4 py-2 fw-bold text-white shadow-sm" id="btnNovaRota">
                    <i class="bi bi-plus-lg me-1"></i> Nova Rota
                </button>
            </header>

            <section class="row g-4 mb-5">
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card h-100 border-0 shadow-sm p-4 rounded-4 dashboard-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h2 class="fs-6 text-muted mb-2">Rotas Hoje</h2>
                                <span class="fs-1 fw-bold text-navy" id="cardRotasHoje">—</span>
                            </div>
                            <div class="icon-shape bg-light-blue text-navy rounded-3 p-3">
                                <i class="bi bi-calendar-check fs-4"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card h-100 border-0 shadow-sm p-4 rounded-4 dashboard-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h2 class="fs-6 text-muted mb-2">Entregadores</h2>
                                <span class="fs-1 fw-bold text-navy" id="cardEntregadores">—</span>
                            </div>
                            <div class="icon-shape bg-light-blue text-navy rounded-3 p-3">
                                <i class="bi bi-people fs-4"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card h-100 border-0 shadow-sm p-4 rounded-4 dashboard-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h2 class="fs-6 text-muted mb-2">Concluídas</h2>
                                <span class="fs-1 fw-bold text-navy" id="cardConcluidas">—</span>
                            </div>
                            <div class="icon-shape bg-light-green text-success rounded-3 p-3">
                                <i class="bi bi-check2-circle fs-4"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card h-100 border-0 shadow-sm p-4 rounded-4 dashboard-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h2 class="fs-6 text-muted mb-2">Pendentes</h2>
                                <span class="fs-1 fw-bold text-navy" id="cardPendentes">—</span>
                            </div>
                            <div class="icon-shape bg-light-warning text-warning rounded-3 p-3">
                                <i class="bi bi-clock-history fs-4"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="mb-4">
                <h2 class="h4 fw-bold text-navy mb-4">Rotas Recentes</h2>

                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0 custom-table">
                            <thead class="table-light text-secondary">
                                <tr>
                                    <th class="ps-4 py-3">Código</th>
                                    <th class="py-3">Entregador</th>
                                    <th class="py-3">Status</th>
                                    <th class="pe-4 py-3 text-end">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="ps-4 fw-bold text-navy">#001</td>
                                    <td>Guilherme Araújo</td>
                                    <td><span class="badge bg-primary px-3 py-2 rounded-pill">Em andamento</span></td>
                                    <td class="pe-4 text-end">
                                        <button class="btn btn-outline-orange btn-sm btn-detalhes rounded-3 px-3">Ver detalhes</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="ps-4 fw-bold text-navy">#002</td>
                                    <td>Luan Fernando</td>
                                    <td><span class="badge bg-success px-3 py-2 rounded-pill">Concluída</span></td>
                                    <td class="pe-4 text-end">
                                        <button class="btn btn-outline-orange btn-sm btn-detalhes rounded-3 px-3">Ver detalhes</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="ps-4 fw-bold text-navy">#003</td>
                                    <td>Catarina dos Santos</td>
                                    <td><span class="badge bg-warning text-dark px-3 py-2 rounded-pill">Pendente</span></td>
                                    <td class="pe-4 text-end">
                                        <button class="btn btn-outline-orange btn-sm btn-detalhes rounded-3 px-3">Ver detalhes</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
