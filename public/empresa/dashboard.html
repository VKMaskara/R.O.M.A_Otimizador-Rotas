<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="container">

        <!-- MENU LATERAL -->

        <aside class="sidebar">

            <!-- LOGO -->

            <div class="logo-area">

                <img src="../img/logo.jpeg" alt="Logo ROMA" class="logo">

            </div>

            <!-- MENU -->

            <nav class="menu">

                <a href="dashboard.html" class="active">
                    Dashboard
                </a>

                <a href="rotas.html">
                    Rotas
                </a>

                <a href="entregadores.html">
                    Entregadores
                </a>

                <a href="configuracoes.html">
                    Configurações
                </a>

            </nav>

            <!-- SAIR -->

            <div class="logout">

                <a href="login.html">
                    Sair
                </a>

            </div>

        </aside>


        <!-- CONTEÚDO PRINCIPAL -->

        <main class="main-content">

            <!-- TOPO -->

            <header class="topbar">

                <h1>
                    Dashboard
                </h1>

                <button>
                    + Nova Rota
                </button>

            </header>


            <!-- CARDS -->

            <section class="cards">

                <!-- CARD 1 -->

                <div class="card">

                    <h2>
                        Rotas Hoje
                    </h2>

                    <span>
                        12
                    </span>

                </div>


                <!-- CARD 2 -->

                <div class="card">

                    <h2>
                        Entregadores
                    </h2>

                    <span>
                        5
                    </span>

                </div>


                <!-- CARD 3 -->

                <div class="card">

                    <h2>
                        Concluídas
                    </h2>

                    <span>
                        8
                    </span>

                </div>


                <!-- CARD 4 -->

                <div class="card">

                    <h2>
                        Pendentes
                    </h2>

                    <span>
                        4
                    </span>

                </div>

            </section>


            <!-- ROTAS RECENTES -->

            <section class="rotas">

                <h2>
                    Rotas Recentes
                </h2>

                <!-- ROTA -->

                <div class="rota-item">

                    <div>
                        <h3>
                            Rota #001
                        </h3>

                        <p>
                            Entregador: Guilherme Araújo
                        </p>
                    </div>

                    <button>
                        Ver detalhes
                    </button>

                </div>


                <!-- ROTA -->

                <div class="rota-item">

                    <div>
                        <h3>
                            Rota #002
                        </h3>

                        <p>
                            Entregador: Luan Fernando
                        </p>
                    </div>

                    <button>
                        Ver detalhes
                    </button>

                </div>


                <!-- ROTA -->

                <div class="rota-item">

                    <div>
                        <h3>
                            Rota #003
                        </h3>

                        <p>
                            Entregador: Catarina dos Santos
                        </p>
                    </div>

                    <button>
                        Ver detalhes
                    </button>

                </div>

            </section>

        </main>

    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
