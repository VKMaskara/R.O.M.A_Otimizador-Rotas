<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.O.M.A - Entregadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <div class="d-flex min-vh-100 layout-container">

        <aside class="sidebar offcanvas-lg offcanvas-start text-white p-4" id="sidebarMenu">
            <div class="offcanvas-header d-lg-none p-0 mb-4">
                <h5 class="offcanvas-title text-white">Menu ROMA</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu"></button>
            </div>

            <div class="logo-area bg-white p-3 rounded-4 text-center mb-5">
                <img src="../img/logo.jpeg" alt="Logo ROMA" class="img-fluid logo-img">
            </div>

            <nav class="menu-nav d-flex flex-column gap-2 flex-grow-1">
                <a href="dashboard.html" class="nav-link-custom">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
                <a href="rotas.html" class="nav-link-custom">
                    <i class="bi bi-geo-alt me-2"></i> Rotas
                </a>
                <a href="entregadores.html" class="nav-link-custom active">
                    <i class="bi bi-truck me-2"></i> Entregadores
                </a>
                <a href="configuracoes.html" class="nav-link-custom">
                    <i class="bi bi-gear me-2"></i> Configurações
                </a>
            </nav>

            <div class="logout-area mt-auto pt-4">
                <a href="login.html" class="btn-logout text-center d-block w-100 py-3 rounded-3 text-decoration-none fw-bold text-white">
                    <i class="bi bi-box-arrow-right me-2"></i> Sair
                </a>
            </div>
        </aside>

        <main class="main-content flex-grow-1 p-4 p-md-5">
            
            <header class="d-flex justify-content-between align-items-center mb-5">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-dark d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                        <i class="bi bi-list fs-4"></i>
                    </button>
                    <h1 class="h2 fw-bold text-navy mb-0">Entregadores</h1>
                </div>
                <button class="btn btn-orange px-4 py-2 fw-bold text-white shadow-sm" id="btnNovoEntregador">
                    <i class="bi bi-person-plus me-1"></i> Novo Entregador
                </button>
            </header>

            <section class="mb-5">
                <div class="card border-0 shadow-sm rounded-4 p-3">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted ps-3">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" class="form-control border-start-0 py-2 ps-2" placeholder="Pesquisar entregador por nome, veículo ou status..." id="inputPesquisa">
                    </div>
                </div>
            </section>

            <section class="row g-4" id="listaEntregadores">
                
                <div class="col-12 col-md-6 col-xl-4">
                    <div class="card h-100 border-0 shadow-sm p-4 rounded-4 dashboard-card d-flex flex-column justify-content-between">
                        <div>
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div class="bg-light-blue text-navy rounded-circle p-3 d-inline-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                                    <i class="bi bi-person fs-4"></i>
                                </div>
                                <span class="badge bg-success px-3 py-2 rounded-pill">Ativo</span>
                            </div>
                            
                            <h2 class="h5 fw-bold text-navy mb-3">Guilherme Araújo</h2>
                            
                            <p class="text-muted small mb-2">
                                <i class="bi bi-telephone me-2"></i>(11) 98989-8989
                            </p>
                            <p class="text-muted small mb-0">
                                <i class="bi bi-bicycle me-2"></i>Veículo: <strong>Moto</strong>
                            </p>
                        </div>

                        <div class="d-flex gap-2 mt-4 pt-2 border-top">
                            <button class="btn btn-outline-orange btn-sm flex-grow-1 py-2 rounded-3 btn-perfil">Ver Perfil</button>
                            <button class="btn btn-light btn-sm text-secondary px-3 py-2 rounded-3 btn-editar" title="Editar"><i class="bi bi-pencil"></i></button>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-xl-4">
                    <div class="card h-100 border-0 shadow-sm p-4 rounded-4 dashboard-card d-flex flex-column justify-content-between">
                        <div>
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div class="bg-light-blue text-navy rounded-circle p-3 d-inline-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                                    <i class="bi bi-person fs-4"></i>
                                </div>
                                <span class="badge bg-primary px-3 py-2 rounded-pill">Em Rota</span>
                            </div>
                            
                            <h2 class="h5 fw-bold text-navy mb-3">Luan Ferreira</h2>
                            
                            <p class="text-muted small mb-2">
                                <i class="bi bi-telephone me-2"></i>(11) 98888-8888
                            </p>
                            <p class="text-muted small mb-0">
                                <i class="bi bi-truck-front me-2"></i>Veículo: <strong>Van</strong>
                            </p>
                        </div>

                        <div class="d-flex gap-2 mt-4 pt-2 border-top">
                            <button class="btn btn-outline-orange btn-sm flex-grow-1 py-2 rounded-3 btn-perfil">Ver Perfil</button>
                            <button class="btn btn-light btn-sm text-secondary px-3 py-2 rounded-3 btn-editar" title="Editar"><i class="bi bi-pencil"></i></button>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-xl-4">
                    <div class="card h-100 border-0 shadow-sm p-4 rounded-4 dashboard-card d-flex flex-column justify-content-between">
                        <div>
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div class="bg-light-blue text-navy rounded-circle p-3 d-inline-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                                    <i class="bi bi-person fs-4"></i>
                                </div>
                                <span class="badge bg-secondary px-3 py-2 rounded-pill">Offline</span>
                            </div>
                            
                            <h2 class="h5 fw-bold text-navy mb-3">Catarina dos Santos</h2>
                            
                            <p class="text-muted small mb-2">
                                <i class="bi bi-telephone me-2"></i>(11) 97777-7777
                            </p>
                            <p class="text-muted small mb-0">
                                <i class="bi bi-truck me-2"></i>Veículo: <strong>Caminhão</strong>
                            </p>
                        </div>

                        <div class="d-flex gap-2 mt-4 pt-2 border-top">
                            <button class="btn btn-outline-orange btn-sm flex-grow-1 py-2 rounded-3 btn-perfil">Ver Perfil</button>
                            <button class="btn btn-light btn-sm text-secondary px-3 py-2 rounded-3 btn-editar" title="Editar"><i class="bi bi-pencil"></i></button>
                        </div>
                    </div>
                </div>

            </section>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/entregadores.js"></script>
</body>
</html>
