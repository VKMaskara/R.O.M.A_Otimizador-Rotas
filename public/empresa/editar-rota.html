<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.O.M.A - Editar Rota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/editar-rota.css">
</head>

<body>

    <div class="d-flex min-vh-100 layout-container">

        <!-- MENU LATERAL -->
        <aside class="sidebar offcanvas-lg offcanvas-start text-white p-4" id="sidebarMenu">
            <div class="offcanvas-header d-lg-none p-0 mb-4">
                <h5 class="offcanvas-title text-white">Menu ROMA</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                    data-bs-target="#sidebarMenu"></button>
            </div>

            <div class="logo-area bg-white p-3 rounded-4 text-center mb-5">
                <img src="../img/logo.jpeg" alt="Logo ROMA" class="img-fluid logo-img">
            </div>

            <nav class="menu-nav d-flex flex-column gap-2 flex-grow-1">
                <a href="dashboard.html" class="nav-link-custom">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
                <a href="rotas.html" class="nav-link-custom active">
                    <i class="bi bi-geo-alt me-2"></i> Rotas
                </a>
                <a href="entregadores.html" class="nav-link-custom">
                    <i class="bi bi-truck me-2"></i> Entregadores
                </a>
                <a href="configuracoes.html" class="nav-link-custom">
                    <i class="bi bi-gear me-2"></i> Configurações
                </a>
            </nav>

            <div class="logout-area mt-auto pt-4">
                <a href="login.html"
                    class="btn-logout text-center d-block w-100 py-3 rounded-3 text-decoration-none fw-bold text-white">
                    <i class="bi bi-box-arrow-right me-2"></i> Sair
                </a>
            </div>
        </aside>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="main-content flex-grow-1 p-4 p-md-5">

            <!-- TOPO -->
            <header class="d-flex justify-content-between align-items-center mb-5">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-dark d-lg-none" type="button" data-bs-toggle="offcanvas"
                        data-bs-target="#sidebarMenu">
                        <i class="bi bi-list fs-4"></i>
                    </button>
                    <div>
                        <h1 class="h2 fw-bold text-navy mb-0">Editar Rota</h1>
                        <p id="subtitulo-rota" class="text-muted mb-0 small">Carregando...</p>
                    </div>
                </div>
                <a href="rotas.html" class="btn btn-outline-secondary px-4 py-2 fw-bold">
                    <i class="bi bi-arrow-left me-1"></i> Voltar
                </a>
            </header>

            <!-- ALERTA DE FEEDBACK -->
            <div id="alerta-feedback" class="alert d-none mb-4 rounded-3" role="alert"></div>

            <!-- FORMULÁRIO -->
            <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">

                <div id="loading-form" class="text-center py-5 text-muted">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                    Carregando dados da rota...
                </div>

                <form id="form-editar-rota" class="d-none">
                    <div class="row g-4">

                        <!-- STATUS -->
                        <div class="col-12 col-md-6">
                            <label for="status" class="form-label fw-semibold text-navy">Status</label>
                            <select id="status" class="form-select form-select-lg input-custom">
                                <option value="pendente">Pendente</option>
                                <option value="em andamento">Em andamento</option>
                                <option value="concluida">Concluída</option>
                            </select>
                        </div>

                        <!-- ENTREGADOR -->
                        <div class="col-12 col-md-6">
                            <label for="entregador_id" class="form-label fw-semibold text-navy">Entregador</label>
                            <select id="entregador_id" class="form-select form-select-lg input-custom">
                                <option value="">Sem entregador</option>
                                <!-- Opções carregadas dinamicamente -->
                            </select>
                        </div>

                        <!-- KM ORIGINAL -->
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-semibold text-navy">KM Original</label>
                            <input type="text" id="km_original"
                                class="form-control form-control-lg input-custom input-readonly"
                                readonly placeholder="—">
                        </div>

                        <!-- KM OTIMIZADO -->
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-semibold text-navy">KM Otimizado</label>
                            <input type="text" id="km_otimizado"
                                class="form-control form-control-lg input-custom input-readonly"
                                readonly placeholder="—">
                        </div>

                        <!-- TEMPO ESTIMADO -->
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-semibold text-navy">Tempo Estimado</label>
                            <input type="text" id="tempo_estimado_min"
                                class="form-control form-control-lg input-custom input-readonly"
                                readonly placeholder="—">
                        </div>

                        <!-- DATA -->
                        <div class="col-12 col-md-6">
                            <label for="data" class="form-label fw-semibold text-navy">Data da Rota</label>
                            <input type="date" id="data" class="form-control form-control-lg input-custom">
                        </div>

                        <!-- PARADAS -->
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold text-navy">Paradas cadastradas</label>
                            <input type="text" id="total_paradas"
                                class="form-control form-control-lg input-custom input-readonly"
                                readonly placeholder="—">
                        </div>

                        <!-- BOTÕES -->
                        <div class="col-12 d-flex gap-3 flex-wrap mt-2">
                            <button type="submit"
                                class="btn btn-orange fw-bold px-5 py-3 text-white flex-grow-1">
                                <i class="bi bi-floppy me-2"></i> Salvar Alterações
                            </button>
                            <a id="btn-cancelar" href="rotas.html"
                                class="btn btn-light fw-bold px-5 py-3 text-navy flex-grow-1 text-center text-decoration-none">
                                <i class="bi bi-x-circle me-2"></i> Cancelar
                            </a>
                        </div>

                    </div>
                </form>

            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/editar-rota.js"></script>
</body>

</html>
