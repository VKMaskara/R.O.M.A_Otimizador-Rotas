<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.O.M.A - Nova Rota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <div class="d-flex min-vh-100 layout-container">

        <aside class="sidebar bg-navy p-4 d-flex flex-column justify-content-between text-white" style="width: 260px;">
            <div>
                <div class="logo-area bg-white p-3 rounded-4 text-center mb-5">
                    <img src="../img/logo.jpeg" alt="Logo ROMA" class="img-fluid" style="max-width: 140px;">
                </div>

                <nav class="menu d-flex flex-column gap-2">
                    <a href="dashboard.html" class="nav-link text-white p-3 rounded-3 fw-bold"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    <a href="rotas.html" class="nav-link text-white p-3 rounded-3 fw-bold active style-active-orange"><i class="bi bi-map me-2"></i> Rotas</a>
                    <a href="entregadores.html" class="nav-link text-white p-3 rounded-3 fw-bold"><i class="bi bi-truck me-2"></i> Entregadores</a>
                    <a href="configuracoes.html" class="nav-link text-white p-3 rounded-3 fw-bold"><i class="bi bi-gear me-2"></i> Configurações</a>
                </nav>
            </div>

            <div class="logout">
                <a href="login.html" id="btn-sair" class="nav-link text-white p-3 rounded-3 fw-bold text-center bg-white-10"><i class="bi bi-box-arrow-right me-2"></i> Sair</a>
            </div>
        </aside>

        <main class="main-content flex-grow-1 p-4 p-md-5 bg-light">
            <header class="topbar mb-5">
                <h1 class="h2 fw-bold text-navy">Nova Rota</h1>
            </header>

            <section class="card border-0 shadow-sm rounded-4 p-4 p-md-5 bg-white">
                <form id="form-rota">
                    <div class="row g-4">
                        
                        <div class="col-md-6">
                            <label for="nomeRota" class="form-label fw-semibold text-navy">Nome da Rota <span class="text-danger">*</span></label>
                            <input type="text" class="form-control py-2.5 rounded-3" id="nomeRota" placeholder="Digite o nome descritivo da rota">
                        </div>

                        <div class="col-md-6">
                            <label for="entregador" class="form-label fw-semibold text-navy">Entregador</label>
                            <select id="entregador" class="form-select py-2.5 rounded-3">
                                <option value="">Selecione um entregador (Opcional)</option>
                                <option value="1">João Silva</option>
                                <option value="2">Maria Oliveira</option>
                                <option value="3">Carlos Santos</option>
                            </select>
                        </div>

                        <div class="col-12 mt-4">
                            <label class="form-label fw-semibold text-navy d-block">Forma de Entrada do Endereço <span class="text-danger">*</span></label>
                            <div class="btn-group w-100" role="group">
                                <input type="radio" class="btn-check" name="tipoEndereco" id="tipoManual" value="manual" checked>
                                <label class="btn btn-outline-navy py-2.5 fw-bold" for="tipoManual"><i class="bi bi-keyboard me-2"></i>Digitação Manual</label>

                                <input type="radio" class="btn-check" name="tipoEndereco" id="tipoExcel" value="excel">
                                <label class="btn btn-outline-navy py-2.5 fw-bold" for="tipoExcel"><i class="bi bi-file-earmark-excel me-2"></i>Importar Planilha Excel</label>
                            </div>
                        </div>

                        <div class="col-12" id="container-endereco-manual">
                            <label for="endereco" class="form-label fw-semibold text-navy">Endereço de Entrega <span class="text-danger">*</span></label>
                            <input type="text" class="form-control py-2.5 rounded-3" id="endereco" placeholder="Rua, número, bairro, cidade - UF">
                        </div>

                        <div class="col-12 d-none" id="container-endereco-excel">
                            <label for="arquivoExcel" class="form-label fw-semibold text-navy">Upload do Arquivo Excel (.xlsx, .xls, .csv) <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-cloud-arrow-up text-navy"></i></span>
                                <input type="file" class="form-control py-2.5 rounded-end-3" id="arquivoExcel" accept=".xlsx, .xls, .csv">
                            </div>
                            <div class="form-text text-muted">A planilha deve conter uma coluna identificada com o nome do endereço de destino.</div>
                        </div>

                        <div class="col-md-6">
                            <label for="prioridade" class="form-label fw-semibold text-navy">Prioridade <span class="text-danger">*</span></label>
                            <select id="prioridade" class="form-select py-2.5 rounded-3">
                                <option value="">Selecione</option>
                                <option value="baixa">Baixa</option>
                                <option value="media">Média</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="horario" class="form-label fw-semibold text-navy">Horário Estimado de Entrega <span class="text-danger">*</span></label>
                            <input type="time" class="form-control py-2.5 rounded-3" id="horario">
                        </div>

                        <div class="col-12">
                            <label for="observacoes" class="form-label fw-semibold text-navy">Observações Adicionais</label>
                            <textarea id="observacoes" class="form-control rounded-3" rows="3" placeholder="Informações complementares (Ex: Ponto de referência, cuidados com a carga)"></textarea>
                        </div>

                        <div class="col-12 d-flex flex-wrap gap-3 mt-5 pt-3 border-top">
                            <button type="submit" class="btn btn-orange px-5 py-2.5 fw-bold text-white shadow-sm rounded-3">
                                <i class="bi bi-check-lg me-1"></i> Criar Rota
                            </button>
                            <a href="rotas.html" class="btn btn-light text-secondary px-4 py-2.5 fw-semibold rounded-3 border">
                                <i class="bi bi-x-lg me-1"></i> Cancelar
                            </a>
                        </div>

                    </div>
                </form>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/nova-rota.js"></script>
</body>
</html>
